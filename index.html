/* ----------------------------------------------------------------------------
 *  PALETTE
 *  --------
 *  cream paper background, warm black ink, oxblood for debits, forest for
 *  credits. Three network accents: gold (MG), slate (WU), aubergine (RIA).
 * -------------------------------------------------------------------------- */
const C = {
  paper: "#FAF7F0",
  paperDeep: "#F2EDE0",
  ink: "#1A1814",
  inkSoft: "#3D3A33",
  muted: "#807A6C",
  hairline: "#D9D2C2",
  credit: "#1F6F4F",
  debit: "#8B2635",
  mg: "#B8860B",
  // MoneyGram — gold
  wu: "#3B5A7A",
  // Western Union — slate
  ri: "#6B3B5F",
  // RIA — aubergine
  cash: "#5C5042" // Cash deposits — warm umber
};
const NETWORK_COLOR = {
  MoneyGram: C.mg,
  "Western Union": C.wu,
  RIA: C.ri,
  Espèces: C.cash,
  Autre: C.muted
};

/* ----------------------------------------------------------------------------
 *  PARSERS
 * -------------------------------------------------------------------------- */

// Decode an ArrayBuffer trying UTF-8 first then ISO-8859-1 (Latin-1).
// Many bank exports are still Latin-1.
function decodeBuffer(buffer) {
  const utf8 = new TextDecoder("utf-8", {
    fatal: false
  }).decode(buffer);
  // Replacement char U+FFFD indicates UTF-8 decoding failed for some bytes
  if (utf8.includes("\uFFFD")) {
    return new TextDecoder("iso-8859-1").decode(buffer);
  }
  return utf8;
}

// "1 590 892" -> 1590892    "-441 869" -> -441869    handles NBSP / NNBSP
function parseAmount(str) {
  if (str == null) return 0;
  const cleaned = String(str).replace(/[\s\u00A0\u202F]/g, "").replace(",", ".");
  const n = parseFloat(cleaned);
  return Number.isFinite(n) ? n : 0;
}

// "10/06/2026" -> Date
function parseDate(str) {
  const m = String(str || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(+m[3], +m[2] - 1, +m[1]);
}

// "10/06/2026" -> "2026-06-10" (sortable iso-ish key)
function dateKey(str) {
  const d = parseDate(str);
  if (!d) return "";
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  return `${y}-${mo}-${da}`;
}

// Categorise a Libellé into { kind, direction, network, subtype }.
function parseLibelle(libelle) {
  if (!libelle) return {
    kind: "Autre",
    direction: "—",
    network: "Autre",
    subtype: "—",
    networkCode: "?"
  };
  const raw = String(libelle).trim();
  if (/^VERSEMENT\s+ESPECES/i.test(raw)) {
    const m = raw.match(/PAR:\s*(.+)$/i);
    return {
      kind: "Versement",
      direction: "Dépôt",
      network: "Espèces",
      networkCode: "CASH",
      subtype: "Versement espèces",
      counterparty: m ? m[1].trim() : ""
    };
  }
  let str = raw;
  let kind = "Standard";
  let isRmb = false;
  if (/^ANNUL\s/i.test(str)) {
    kind = "Annulation";
    str = str.replace(/^ANNUL\s+/i, "");
  } else if (/^Rmb\s/i.test(str)) {
    kind = "Remboursement";
    isRmb = true;
    str = str.replace(/^Rmb\s+/i, "");
  }

  // Standard pattern: Pmt|Env <subtype> <MG|WU|RI> ...
  // Rmb pattern (no direction): <subtype> <MG|WU|RI> ...
  let direction, subRaw, code;
  const stdMatch = str.match(/^(Pmt|Env)\s+(\w+)\s+(MG|WU|RI)\b/i);
  const rmbMatch = isRmb && str.match(/^(\w+)\s+(MG|WU|RI)\b/i);
  if (stdMatch) {
    direction = stdMatch[1].toLowerCase() === "pmt" ? "Paiement" : "Envoi";
    subRaw = stdMatch[2];
    code = stdMatch[3].toUpperCase();
  } else if (rmbMatch) {
    direction = "—"; // refund has no explicit direction
    subRaw = rmbMatch[1];
    code = rmbMatch[2].toUpperCase();
  } else {
    return {
      kind,
      direction: "—",
      network: "Autre",
      networkCode: "?",
      subtype: raw.slice(0, 24)
    };
  }
  const sub = subRaw.toLowerCase();
  const subtype = sub === "total" ? "Total" : sub === "comsa" || sub === "com" ? "Commission" : sub === "gchgsa" ? "Charge groupe" : subRaw;
  const network = code === "MG" ? "MoneyGram" : code === "WU" ? "Western Union" : "RIA";
  return {
    kind,
    direction,
    network,
    networkCode: code,
    subtype
  };
}

/* Parse the full statement. Returns { meta, rows } */
function parseStatement(text) {
  const lines = text.split(/\r?\n/);

  // Pull metadata from header lines before the column header row
  const meta = {
    client: "",
    account: "",
    period: "",
    currency: ""
  };
  let headerIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const L = lines[i];
    if (/^"?Date de l'op[eé]ration/i.test(L)) {
      headerIdx = i;
      break;
    }
    const clientM = L.match(/Client\s*:\s*"?([^"]+?)"?\s*$/i);
    if (clientM) meta.client = clientM[1].trim();
    const accountM = L.match(/Activit[eé] pour le num[eé]ro de compte\s+(\S+)\s*(\S+)?/i);
    if (accountM) {
      meta.account = accountM[1].trim();
      meta.currency = (accountM[2] || "").replace(/"/g, "").trim();
    }
    const periodM = L.match(/De\s+(.+?)\s+au\s+(.+?)"?\s*$/i);
    if (periodM) meta.period = `${periodM[1].trim()} → ${periodM[2].trim()}`;
  }
  if (headerIdx === -1) {
    return {
      meta,
      rows: [],
      error: "Ligne d'en-tête introuvable."
    };
  }

  // Parse from the header line forward using PapaParse
  const dataText = lines.slice(headerIdx).join("\n");
  const result = Papa.parse(dataText, {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });
  const rows = result.data.filter(r => r && r["Date de l'opération"] && r["Libellé"]).map((r, idx) => {
    const libelle = r["Libellé"] || "";
    const cat = parseLibelle(libelle);
    const amount = parseAmount(r["Montant"]);
    const balance = parseAmount(r["Solde"]);
    const opDate = r["Date de l'opération"];
    const valDate = r["Date Valeur"];
    return {
      idx,
      opDate,
      valDate,
      opDateKey: dateKey(opDate),
      ref: r["Référence"] || "",
      amount,
      balance,
      libelle,
      ...cat
    };
  });
  return {
    meta,
    rows
  };
}

/* ----------------------------------------------------------------------------
 *  FORMATTERS
 * -------------------------------------------------------------------------- */

const NNBSP = "\u202F";
function fmtNum(n, opts = {}) {
  const {
    unit = "",
    sign = "auto"
  } = opts;
  if (!Number.isFinite(n)) return "—";
  const negative = n < 0;
  const abs = Math.abs(Math.round(n));
  const grouped = abs.toString().replace(/\B(?=(\d{3})+(?!\d))/g, NNBSP);
  let prefix = "";
  if (sign === "always") prefix = negative ? "−" : "+";else if (sign === "auto") prefix = negative ? "−" : "";
  return `${prefix}${grouped}${unit ? NNBSP + unit : ""}`;
}
function fmtCompact(n) {
  if (!Number.isFinite(n)) return "—";
  const abs = Math.abs(n);
  const sign = n < 0 ? "−" : "";
  if (abs >= 1_000_000) return `${sign}${(abs / 1_000_000).toFixed(1)} M`;
  if (abs >= 1_000) return `${sign}${(abs / 1_000).toFixed(0)} k`;
  return `${sign}${Math.round(abs)}`;
}
function fmtDateShort(str) {
  const d = parseDate(str);
  if (!d) return str;
  return d.toLocaleDateString("fr-FR", {
    day: "2-digit",
    month: "short"
  });
}

/* ----------------------------------------------------------------------------
 *  ANALYTICS
 * -------------------------------------------------------------------------- */

function buildAnalytics(rows) {
  if (!rows.length) return null;

  // Sort oldest → newest for time series
  const chronological = [...rows].sort((a, b) => a.opDateKey.localeCompare(b.opDateKey));

  // Versements espèces
  const versements = rows.filter(r => r.kind === "Versement");
  const totalVersements = versements.reduce((s, r) => s + r.amount, 0);

  // Volume traité = sum of |amount| over "Total" rows for Pmt + Env (excludes commissions, charges)
  const totalRows = rows.filter(r => r.subtype === "Total" && (r.direction === "Paiement" || r.direction === "Envoi"));
  const volumeTraite = totalRows.reduce((s, r) => s + Math.abs(r.amount), 0);

  // Commissions (ComSA) — abs sum
  const comRows = rows.filter(r => r.subtype === "Commission");
  const totalCommissions = comRows.reduce((s, r) => s + Math.abs(r.amount), 0);

  // Charges groupe (GChgSA) — abs sum
  const chgRows = rows.filter(r => r.subtype === "Charge groupe");
  const totalCharges = chgRows.reduce((s, r) => s + Math.abs(r.amount), 0);

  // Net flow over the period: last balance - first balance (chronologically)
  const firstBalance = chronological[0]?.balance ?? 0;
  const lastBalance = chronological[chronological.length - 1]?.balance ?? 0;
  const netSolde = lastBalance - firstBalance;

  // Crédits / Débits split
  const credits = rows.filter(r => r.amount > 0).reduce((s, r) => s + r.amount, 0);
  const debits = rows.filter(r => r.amount < 0).reduce((s, r) => s + Math.abs(r.amount), 0);

  // By network breakdown
  const networks = ["MoneyGram", "Western Union", "RIA"];
  const byNetwork = networks.map(net => {
    const netRows = rows.filter(r => r.network === net && r.kind !== "Annulation" && r.kind !== "Remboursement");
    const pmtRowsTotal = netRows.filter(r => r.direction === "Paiement" && r.subtype === "Total");
    const envRowsTotal = netRows.filter(r => r.direction === "Envoi" && r.subtype === "Total");
    const pmtTotal = pmtRowsTotal.reduce((s, r) => s + r.amount, 0);
    const envTotal = envRowsTotal.reduce((s, r) => s + r.amount, 0);
    const commission = netRows.filter(r => r.subtype === "Commission").reduce((s, r) => s + Math.abs(r.amount), 0);
    const charge = netRows.filter(r => r.subtype === "Charge groupe").reduce((s, r) => s + Math.abs(r.amount), 0);
    const count = rows.filter(r => r.network === net).length;
    return {
      network: net,
      paiements: pmtTotal,
      // positive amounts = inflows from network
      paiementsCount: pmtRowsTotal.length,
      paiementsMoyen: pmtRowsTotal.length ? pmtTotal / pmtRowsTotal.length : 0,
      envois: Math.abs(envTotal),
      // shown as positive volume sent out
      envoisCount: envRowsTotal.length,
      envoisMoyen: envRowsTotal.length ? Math.abs(envTotal) / envRowsTotal.length : 0,
      commission,
      charge,
      count,
      volume: pmtTotal + Math.abs(envTotal)
    };
  });

  // Daily activity: sum of |Total| amounts by network
  const dayMap = new Map();
  rows.filter(r => r.subtype === "Total" && (r.direction === "Paiement" || r.direction === "Envoi")).forEach(r => {
    if (!dayMap.has(r.opDateKey)) {
      dayMap.set(r.opDateKey, {
        dateKey: r.opDateKey,
        dateLabel: fmtDateShort(r.opDate),
        MoneyGram: 0,
        "Western Union": 0,
        RIA: 0
      });
    }
    const slot = dayMap.get(r.opDateKey);
    if (slot[r.network] != null) slot[r.network] += Math.abs(r.amount);
  });
  const dailyVolume = [...dayMap.values()].sort((a, b) => a.dateKey.localeCompare(b.dateKey));

  // Daily balance evolution (last balance recorded per day, in chronological order)
  const balanceMap = new Map();
  chronological.forEach(r => {
    balanceMap.set(r.opDateKey, {
      dateKey: r.opDateKey,
      dateLabel: fmtDateShort(r.opDate),
      solde: r.balance
    });
  });
  const dailyBalance = [...balanceMap.values()].sort((a, b) => a.dateKey.localeCompare(b.dateKey));

  // All libellé categories (the 20+ unique patterns)
  const catMap = new Map();
  rows.forEach(r => {
    const key = [r.kind, r.direction, r.subtype, r.network].filter(x => x && x !== "—").join(" · ");
    if (!catMap.has(key)) {
      catMap.set(key, {
        category: key,
        kind: r.kind,
        direction: r.direction,
        subtype: r.subtype,
        network: r.network,
        count: 0,
        sum: 0,
        sumAbs: 0
      });
    }
    const slot = catMap.get(key);
    slot.count += 1;
    slot.sum += r.amount;
    slot.sumAbs += Math.abs(r.amount);
  });
  const categories = [...catMap.values()].sort((a, b) => b.sumAbs - a.sumAbs);

  // Annulations + Remboursements
  const annulations = rows.filter(r => r.kind === "Annulation").reduce((s, r) => s + Math.abs(r.amount), 0);
  const remboursements = rows.filter(r => r.kind === "Remboursement").reduce((s, r) => s + Math.abs(r.amount), 0);
  return {
    rowCount: rows.length,
    firstBalance,
    lastBalance,
    netSolde,
    totalVersements,
    versementCount: versements.length,
    volumeTraite,
    totalCommissions,
    totalCharges,
    credits,
    debits,
    byNetwork,
    dailyVolume,
    dailyBalance,
    categories,
    annulations,
    remboursements
  };
}

/* ----------------------------------------------------------------------------
 *  STORAGE — localStorage persistence
 * -------------------------------------------------------------------------- */
const STORAGE_KEY = "goldfinance:files:v1";
function loadStoredFiles() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const stored = JSON.parse(raw);
    if (!Array.isArray(stored)) return [];
    return stored.map(f => {
      try {
        const parsed = parseStatement(f.csvText);
        if (!parsed.rows.length) return null;
        return {
          ...f,
          parsed
        };
      } catch (e) {
        return null;
      }
    }).filter(Boolean);
  } catch (e) {
    return [];
  }
}
function persistFiles(files) {
  try {
    const toStore = files.map(f => ({
      id: f.id,
      name: f.name,
      csvText: f.csvText,
      enabled: f.enabled,
      uploadedAt: f.uploadedAt
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore));
    return true;
  } catch (e) {
    // QuotaExceededError or similar
    return false;
  }
}
function makeId() {
  return `f${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
}

/* Combined metadata when several files are active. */
function combinedMeta(enabledFiles) {
  if (enabledFiles.length === 0) return {
    client: "",
    account: "",
    currency: "",
    period: ""
  };
  if (enabledFiles.length === 1) return enabledFiles[0].parsed.meta;
  const months = ["jan", "fév", "mar", "avr", "mai", "juin", "juil", "août", "sep", "oct", "nov", "déc"];
  const fmt = k => {
    if (!k) return "";
    const [y, m, d] = k.split("-");
    return `${parseInt(d, 10)} ${months[parseInt(m, 10) - 1]} ${y}`;
  };
  const allKeys = enabledFiles.flatMap(f => f.parsed.rows.map(r => r.opDateKey)).filter(Boolean).sort();
  const start = allKeys[0];
  const end = allKeys[allKeys.length - 1];
  const clients = [...new Set(enabledFiles.map(f => f.parsed.meta.client).filter(Boolean))];
  const accounts = [...new Set(enabledFiles.map(f => f.parsed.meta.account).filter(Boolean))];
  const currency = enabledFiles[0].parsed.meta.currency;
  return {
    client: clients.length === 1 ? clients[0] : clients.join(" · "),
    account: accounts.length === 1 ? accounts[0] : `${accounts.length} comptes`,
    currency,
    period: start && end ? `${fmt(start)} → ${fmt(end)}` : ""
  };
}

function GoldFinanceAnalyse() {
  // Files: { id, name, csvText, parsed, enabled, uploadedAt }
  const [files, setFiles] = useState(() => loadStoredFiles());
  const [error, setError] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [tab, setTab] = useState("reseau");
  const [search, setSearch] = useState("");
  const [filterNetwork, setFilterNetwork] = useState("Tous");
  const [filterKind, setFilterKind] = useState("Tous");
  const [storageWarning, setStorageWarning] = useState(false);
  const fileInputRef = useRef(null);

  // Persist on every change to the files array
  useEffect(() => {
    const ok = persistFiles(files);
    setStorageWarning(!ok && files.length > 0);
  }, [files]);
  const handleFile = useCallback(file => {
    if (!file) return;
    setError("");
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const text = decodeBuffer(e.target.result);
        const result = parseStatement(text);
        if (result.error) {
          setError(result.error);
          return;
        }
        if (!result.rows.length) {
          setError("Aucune transaction trouvée dans le fichier.");
          return;
        }
        const newFile = {
          id: makeId(),
          name: file.name,
          csvText: text,
          parsed: result,
          enabled: true,
          uploadedAt: new Date().toISOString()
        };
        setFiles(prev => {
          // Replace existing entry with same filename, else append
          const existing = prev.findIndex(f => f.name === newFile.name);
          if (existing >= 0) {
            const next = [...prev];
            next[existing] = {
              ...newFile,
              enabled: prev[existing].enabled
            };
            return next;
          }
          return [...prev, newFile];
        });
      } catch (err) {
        setError(`Erreur de lecture : ${err.message}`);
      }
    };
    reader.onerror = () => setError("Impossible de lire le fichier.");
    reader.readAsArrayBuffer(file);
  }, []);
  const toggleFile = useCallback(id => {
    setFiles(prev => prev.map(f => f.id === id ? {
      ...f,
      enabled: !f.enabled
    } : f));
